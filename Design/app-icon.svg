<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Sun body gradient -->
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="55%" stop-color="#FFB830"/>
      <stop offset="100%" stop-color="#FF9500"/>
    </radialGradient>
    <!-- Left circle gradient (warm pink) -->
    <linearGradient id="circleLeft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB5C5"/>
      <stop offset="100%" stop-color="#FF8FA3"/>
    </linearGradient>
    <!-- Right circle gradient (warm peach) -->
    <linearGradient id="circleRight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFDAB9"/>
      <stop offset="100%" stop-color="#FFB088"/>
    </linearGradient>
  </defs>

  <!-- Background fill -->
  <rect width="1024" height="1024" fill="#FF9500"/>

  <!-- Soft rounded sun rays using ellipses -->
  <g transform="translate(512, 480)">
    <ellipse rx="32" ry="100" fill="#FFD54F" opacity="0.4" transform="rotate(0) translate(0,-380)"/>
    <ellipse rx="32" ry="100" fill="#FFD54F" opacity="0.4" transform="rotate(30) translate(0,-380)"/>
    <ellipse rx="32" ry="100" fill="#FFD54F" opacity="0.4" transform="rotate(60) translate(0,-380)"/>
    <ellipse rx="32" ry="100" fill="#FFD54F" opacity="0.4" transform="rotate(90) translate(0,-380)"/>
    <ellipse rx="32" ry="100" fill="#FFD54F" opacity="0.4" transform="rotate(120) translate(0,-380)"/>
    <ellipse rx="32" ry="100" fill="#FFD54F" opacity="0.4" transform="rotate(150) translate(0,-380)"/>
    <ellipse rx="32" ry="100" fill="#FFD54F" opacity="0.4" transform="rotate(180) translate(0,-380)"/>
    <ellipse rx="32" ry="100" fill="#FFD54F" opacity="0.4" transform="rotate(210) translate(0,-380)"/>
    <ellipse rx="32" ry="100" fill="#FFD54F" opacity="0.4" transform="rotate(240) translate(0,-380)"/>
    <ellipse rx="32" ry="100" fill="#FFD54F" opacity="0.4" transform="rotate(270) translate(0,-380)"/>
    <ellipse rx="32" ry="100" fill="#FFD54F" opacity="0.4" transform="rotate(300) translate(0,-380)"/>
    <ellipse rx="32" ry="100" fill="#FFD54F" opacity="0.4" transform="rotate(330) translate(0,-380)"/>
  </g>

  <!-- Main sun circle — centered vertically -->
  <circle cx="512" cy="480" r="330" fill="url(#sunGrad)"/>

  <!-- Inner glow -->
  <circle cx="512" cy="460" r="280" fill="#FFE066" opacity="0.25"/>

  <!-- Two overlapping friend circles — centered in sun -->
  <!-- Left circle -->
  <circle cx="448" cy="420" r="115" fill="url(#circleLeft)" opacity="0.9"/>
  <circle cx="448" cy="420" r="115" fill="none" stroke="white" stroke-width="4" opacity="0.5"/>

  <!-- Right circle (overlaps left) -->
  <circle cx="576" cy="420" r="115" fill="url(#circleRight)" opacity="0.9"/>
  <circle cx="576" cy="420" r="115" fill="none" stroke="white" stroke-width="4" opacity="0.5"/>

  <!-- Smiley faces -->
  <!-- Left face -->
  <circle cx="426" cy="404" r="11" fill="white" opacity="0.8"/>
  <circle cx="468" cy="404" r="11" fill="white" opacity="0.8"/>
  <path d="M 424 432 Q 448 454 472 432" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Right face -->
  <circle cx="554" cy="404" r="11" fill="white" opacity="0.8"/>
  <circle cx="596" cy="404" r="11" fill="white" opacity="0.8"/>
  <path d="M 552 432 Q 576 454 600 432" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round" opacity="0.8"/>

  <!-- FriendsCast text — wider, near full icon width -->
  <text x="512" y="620" text-anchor="middle" font-family="'SF Pro Rounded', 'Nunito', 'Baloo 2', system-ui, sans-serif" font-size="120" font-weight="800" fill="white" letter-spacing="0">
    FriendsCast
  </text>
</svg>
