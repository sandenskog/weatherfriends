<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8ECF4"/>
    </linearGradient>
    <radialGradient id="miniSun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FFB347"/>
    </radialGradient>
    <filter id="cloudShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#B0BFD6" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Sun peeking -->
  <circle cx="82" cy="35" r="18" fill="url(#miniSun)"/>
  <!-- Rays -->
  <line x1="82" y1="10" x2="82" y2="18" stroke="#FFD93D" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="102" y1="25" x2="96" y2="29" stroke="#FFD93D" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="105" y1="45" x2="98" y2="43" stroke="#FFD93D" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="65" y1="20" x2="70" y2="26" stroke="#FFD93D" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <!-- Cloud -->
  <g filter="url(#cloudShadow)">
    <ellipse cx="50" cy="72" rx="38" ry="22" fill="url(#cloudGrad)"/>
    <circle cx="32" cy="58" r="20" fill="url(#cloudGrad)"/>
    <circle cx="58" cy="52" r="24" fill="url(#cloudGrad)"/>
    <circle cx="75" cy="62" r="16" fill="url(#cloudGrad)"/>
  </g>
  <!-- Cloud face -->
  <circle cx="42" cy="68" r="2.5" fill="#B0BFD6"/>
  <circle cx="58" cy="68" r="2.5" fill="#B0BFD6"/>
  <path d="M44 76 Q50 81 56 76" fill="none" stroke="#B0BFD6" stroke-width="2" stroke-linecap="round"/>
</svg>
