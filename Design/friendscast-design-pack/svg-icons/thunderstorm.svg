<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="stormCloud" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B7B9E"/>
      <stop offset="100%" stop-color="#4A5580"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FFB347"/>
    </linearGradient>
    <filter id="boltGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#2D3142" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Cloud -->
  <g filter="url(#tShadow)">
    <ellipse cx="55" cy="38" rx="38" ry="22" fill="url(#stormCloud)"/>
    <circle cx="32" cy="24" r="20" fill="url(#stormCloud)"/>
    <circle cx="58" cy="20" r="24" fill="url(#stormCloud)"/>
    <circle cx="80" cy="30" r="16" fill="url(#stormCloud)"/>
  </g>
  <!-- Shocked face -->
  <circle cx="44" cy="34" r="3" fill="#2D3142" opacity="0.7"/>
  <circle cx="60" cy="34" r="3" fill="#2D3142" opacity="0.7"/>
  <ellipse cx="52" cy="46" rx="4" ry="5" fill="#2D3142" opacity="0.5"/>
  <!-- Lightning bolt -->
  <g filter="url(#boltGlow)">
    <polygon points="55,55 47,78 56,76 48,100 68,70 58,72 65,55" fill="url(#boltGrad)"/>
  </g>
  <!-- Rain streaks -->
  <line x1="28" y1="62" x2="24" y2="75" stroke="#4A6CF7" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="80" y1="58" x2="76" y2="71" stroke="#4A6CF7" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="36" y1="85" x2="32" y2="98" stroke="#4A6CF7" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
</svg>
