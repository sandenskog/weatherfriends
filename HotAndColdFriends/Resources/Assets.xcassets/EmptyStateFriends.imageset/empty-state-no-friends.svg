<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="emptyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B8A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFD93D" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="150" cy="140" r="100" fill="url(#emptyGrad)"/>
  <!-- Lonely person -->
  <circle cx="150" cy="130" r="40" fill="#E8ECF4" stroke="#C0C8D8" stroke-width="3"/>
  <circle cx="140" cy="122" r="4" fill="#8892A8"/>
  <circle cx="160" cy="122" r="4" fill="#8892A8"/>
  <path d="M140 142 Q150 136 160 142" fill="none" stroke="#8892A8" stroke-width="3" stroke-linecap="round"/>
  <!-- Dotted circles for missing friends -->
  <circle cx="80" cy="130" r="25" fill="none" stroke="#C0C8D8" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
  <text x="80" y="136" text-anchor="middle" font-family="system-ui" font-size="20" fill="#C0C8D8" opacity="0.5">?</text>
  <circle cx="220" cy="130" r="25" fill="none" stroke="#C0C8D8" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
  <text x="220" y="136" text-anchor="middle" font-family="system-ui" font-size="20" fill="#C0C8D8" opacity="0.5">?</text>
  <!-- Plus icon -->
  <circle cx="150" cy="200" r="18" fill="#FF6B8A" opacity="0.15"/>
  <line x1="142" y1="200" x2="158" y2="200" stroke="#FF6B8A" stroke-width="3" stroke-linecap="round"/>
  <line x1="150" y1="192" x2="150" y2="208" stroke="#FF6B8A" stroke-width="3" stroke-linecap="round"/>
  <!-- Text -->
  <text x="150" y="250" text-anchor="middle" font-family="'Baloo 2', system-ui" font-weight="700" font-size="16" fill="#2D3142">Lägg till din första vän!</text>
  <text x="150" y="272" text-anchor="middle" font-family="system-ui" font-weight="500" font-size="12" fill="#8892A8">Se vädret hos de du bryr dig om</text>
</svg>
