<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="sleetCloud" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8C4D8"/>
      <stop offset="100%" stop-color="#9AA6BC"/>
    </linearGradient>
    <linearGradient id="sleetDrop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6B9FE8"/>
      <stop offset="100%" stop-color="#4A6CF7"/>
    </linearGradient>
    <filter id="slShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#6B7B9E" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Cloud -->
  <g filter="url(#slShadow)">
    <ellipse cx="55" cy="40" rx="36" ry="20" fill="url(#sleetCloud)"/>
    <circle cx="35" cy="28" r="18" fill="url(#sleetCloud)"/>
    <circle cx="60" cy="24" r="22" fill="url(#sleetCloud)"/>
    <circle cx="78" cy="32" r="14" fill="url(#sleetCloud)"/>
  </g>
  <!-- Confused face -->
  <circle cx="45" cy="36" r="2.5" fill="#6B7B9E"/>
  <circle cx="61" cy="36" r="2.5" fill="#6B7B9E"/>
  <path d="M47 48 L57 46" fill="none" stroke="#6B7B9E" stroke-width="2" stroke-linecap="round"/>
  <!-- Rain drops -->
  <path d="M30 68 Q28 76 30 80 Q32 82 34 80 Q36 76 34 68 Z" fill="url(#sleetDrop)" opacity="0.7"/>
  <path d="M55 72 Q53 80 55 84 Q57 86 59 84 Q61 80 59 72 Z" fill="url(#sleetDrop)" opacity="0.6"/>
  <!-- Snowflakes mixed in -->
  <g fill="none" stroke="#B0BFD6" stroke-width="1.5" stroke-linecap="round" opacity="0.7">
    <g transform="translate(44,78)">
      <line x1="0" y1="-5" x2="0" y2="5"/>
      <line x1="-4.3" y1="-2.5" x2="4.3" y2="2.5"/>
      <line x1="-4.3" y1="2.5" x2="4.3" y2="-2.5"/>
    </g>
    <g transform="translate(72,72)">
      <line x1="0" y1="-5" x2="0" y2="5"/>
      <line x1="-4.3" y1="-2.5" x2="4.3" y2="2.5"/>
      <line x1="-4.3" y1="2.5" x2="4.3" y2="-2.5"/>
    </g>
  </g>
  <!-- More drops and flakes -->
  <circle cx="38" cy="96" r="2" fill="#6B9FE8" opacity="0.4"/>
  <circle cx="65" cy="92" r="2.5" fill="#B0BFD6" opacity="0.4"/>
  <path d="M48 92 Q46 98 48 101 Q50 103 52 101 Q54 98 52 92 Z" fill="url(#sleetDrop)" opacity="0.4"/>
</svg>
