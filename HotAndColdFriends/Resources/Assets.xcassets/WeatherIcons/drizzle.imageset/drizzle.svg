      <stop offset="0%" stop-color="#D0D8E8"/>
      <stop offset="100%" stop-color="#A8B4C8"/>
    </linearGradient>
    <filter id="dShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#8892A8" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Cloud -->
