name: HotAndColdFriends
options:
  bundleIdPrefix: se.sandenskog
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: se.sandenskog.hotandcoldfriends
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "A473BQKT8M"

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS.git
    from: "7.0.0"
  FacebookSDK:
    url: https://github.com/facebook/facebook-ios-sdk.git
    from: "17.0.0"

targets:
  HotAndColdFriends:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HotAndColdFriends
        excludes:
          - "**/@eaDir"
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      # FirebaseFirestoreSwift är integrerat i FirebaseFirestore från Firebase SDK 11.x
      # (ej ett separat produkt längre)
      - package: Firebase
        product: FirebaseStorage
      - package: Firebase
        product: FirebaseFunctions
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - package: FacebookSDK
        product: FacebookCore
      - package: FacebookSDK
        product: FacebookLogin
    entitlements:
      path: HotAndColdFriends/Resources/HotAndColdFriends.entitlements
      properties:
        com.apple.developer.weatherkit: true
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: se.sandenskog.hotandcoldfriends
        INFOPLIST_FILE: HotAndColdFriends/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
